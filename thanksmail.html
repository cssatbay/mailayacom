<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYACOM — Комплимент дня</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #E8E4DF;
    font-family: 'Montserrat', sans-serif;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 620px;
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Top accent line */
  .card::before {
    content: '';
    display: block;
    height: 4px;
    background: linear-gradient(90deg, #D42B2B, #F04848, #D42B2B);
  }

  .card-inner {
    display: flex;
    align-items: center;
    gap: clamp(20px, 5vw, 36px);
    padding: clamp(24px, 5vw, 40px);
  }

  /* Heart */
  .heart-wrap {
    flex-shrink: 0;
    width: clamp(100px, 22vw, 150px);
    height: clamp(100px, 22vw, 150px);
    position: relative;
    animation: fadeIn 0.6s 0.3s both;
  }

  .heart-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 6px 16px rgba(212,43,43,0.25));
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Text */
  .text-block {
    flex: 1;
    min-width: 0;
    animation: fadeUp 0.6s 0.4s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .label {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 4vw, 24px);
    font-style: italic;
    font-weight: 600;
    color: #D42B2B;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .message {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(14px, 3vw, 16px);
    line-height: 1.7;
    color: #333;
  }

  .message strong {
    font-weight: 700;
    color: #1A1A1A;
  }

  .message .highlight {
    font-weight: 700;
    color: #D42B2B;
  }

  /* Footer branding */
  .card-footer {
    padding: 14px clamp(24px, 5vw, 40px);
    border-top: 1px solid #f0ece8;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .card-footer img {
    height: 20px;
    width: auto;
    object-fit: contain;
    opacity: 0.7;
  }

  /* Mobile: stack vertically */
  @media (max-width: 440px) {
    .card-inner {
      flex-direction: column;
      text-align: center;
    }
    .heart-wrap {
      width: 110px;
      height: 110px;
    }
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-inner">
    <!-- Heart -->
    <div class="heart-wrap">
      <svg class="heart-svg" viewBox="0 0 150 150" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F04848"/>
            <stop offset="100%" stop-color="#8B1A1A"/>
          </linearGradient>
          <!-- Noise texture -->
          <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
            <feColorMatrix type="saturate" values="0"/>
            <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
            <feComponentTransfer>
              <feFuncA type="linear" slope="0.4"/>
            </feComponentTransfer>
            <feComposite in2="SourceGraphic" operator="in"/>
            <feBlend in2="SourceGraphic" mode="soft-light"/>
          </filter>
        </defs>
        <path d="M75 130C75 130 15 92 15 52C15 32 32 18 50 18C60 18 68 23 75 32C82 23 90 18 100 18C118 18 135 32 135 52C135 92 75 130 75 130Z"
              fill="url(#hg)" filter="url(#noise)"/>
        <!-- Subtle light reflection -->
        <path d="M75 130C75 130 15 92 15 52C15 32 32 18 50 18C60 18 68 23 75 32"
              fill="rgba(255,255,255,0.08)"/>
      </svg>
    </div>

    <!-- Text -->
    <div class="text-block">
      <div class="label">Комплимент дня</div>
      <div class="message">
        <strong>AYACOM team,</strong> доброе утро! Вместе мы создаём невероятные возможности. <span class="highlight">Вы — наша главная сила!</span>
      </div>
    </div>
  </div>

  <div class="card-footer">
    <img src="https://www.ayacom.kz/local/templates/.default/img/logo.png" alt="AYACOM">
  </div>
</div>

</body>
</html>
